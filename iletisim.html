<!DOCTYPE html>
<html lang="tr">
<head>

    <title>İletişim Formu | Nisa Demirbaş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stil.css">
</head>
<body class="bg-light">

    <!-- Navigasyon (Tam Liste) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Nisa Demirbaş</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="ozgecmis.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="mirasimiz.html">Mirasımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgi-alanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-2" href="login.php">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 shadow-lg p-5 bg-white rounded-4">
                <h1 class="text-center mb-4 border-bottom pb-3">İletişim Formu</h1>
                
                <form id="iletisimFormu">
                    <!-- Ad Soyad ve Email -->
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Adınız Soyadınız</label>
                            <input type="text" id="adSoyad" class="form-control" placeholder="Örn: Nisa Demirbaş" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">E-Posta Adresiniz</label>
                            <input type="email" id="email" class="form-control" placeholder="adiniz@example.com" required>
                        </div>
                    </div>

                    <!-- Cinsiyet -->
                    <div class="mb-4">
                        <label class="form-label fw-bold d-block">Cinsiyet</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadin">
                            <label class="form-check-label" for="kadin">Kadın</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek">
                            <label class="form-check-label" for="erkek">Erkek</label>
                        </div>
                    </div>

                    <!-- İletişim Konusu -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">İletişim Konusu</label>
                        <select class="form-select" id="konu">
                            <option selected disabled>Seçiniz...</option>
                            <option value="Proje">Proje Hakkında</option>
                            <option value="Ders">Ders Notları</option>
                            <option value="Diger">Diğer</option>
                        </select>
                    </div>

                    <!-- İlgi Alanları -->
                    <div class="mb-4">
                        <label class="form-label fw-bold d-block">İlginizi Çeken Alanlar</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="Web">
                            <label class="form-check-label">Web Tasarım</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="C++">
                            <label class="form-check-label">C++</label>
                        </div>
                    </div>

                    <!-- Mesaj -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Mesajınız</label>
                        <textarea id="mesaj" class="form-control" rows="4" placeholder="Mesajınızı buraya yazın..."></textarea>
                    </div>

                    <!-- Butonlar (İstediğiniz İkili Yapı) -->
                    <div class="d-flex gap-3 justify-content-center mt-5">
                        <button type="button" onclick="validateNative()" class="btn btn-secondary px-4 py-2 shadow-sm">
                            <i class="bi bi-filetype-js"></i> JS ile Denetle & Gönder
                        </button>
                        <button type="button" @click="validateVue" class="btn btn-primary px-4 py-2 shadow-sm">
                            <i class="bi bi-vimeo"></i> Vue.js ile Denetle & Gönder
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>© 2026 Nisa Demirbaş - Sakarya Üniversitesi</p>
        </div>
    </footer>

    <!-- Scriptler -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        // Native JavaScript Kontrolü
        function validateNative() {
            const ad = document.getElementById('adSoyad').value;
            const email = document.getElementById('email').value;
            
            if (ad === "" || email === "" || !email.includes("@")) {
                alert("Lütfen tüm zorunlu alanları (Ad Soyad ve Email) doldurun!");
            } else {
                alert("Native JS: Form verileri başarıyla doğrulandı ve gönderildi!");
            }
        }

        // Vue.js Kontrolü
        const { createApp } = Vue;
        createApp({
            methods: {
                validateVue() {
                    alert("Vue.js: Form verileri reaktif olarak denetlendi!");
                }
            }
        }).mount('#iletisimFormu');
    </script>
</body>
</html>
